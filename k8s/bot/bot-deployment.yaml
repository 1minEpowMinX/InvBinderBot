apiVersion: apps/v1
kind: Deployment
metadata:
  name: invbinderbot
spec:
  replicas: 1
  selector:
    matchLabels:
      app: invbinderbot
  template:
    metadata:
      labels:
        app: invbinderbot
    spec:
      containers:
        - name: invbinderbot
          image: ghcr.io/1minepowminx/invbinderbot:latest
          envFrom:
            - configMapRef:
                name: env-bot-config
            - secretRef:
                name: bot-secrets
          volumeMounts:
            - name: bot-pvc
              mountPath: /app/data
            - name: corp-cert
              mountPath: /app/certs
            - name: dhcp-logs-pvc
              mountPath: /app/dhcp-logs
            - name: macs-pvc
              mountPath: /app/csv
      volumes:
        - name: corp-cert
          configMap:
            name: bot-certs
            items:
              - key: corp.crt # specify the key to mount
                path: corp.crt
        - name: bot-pvc
          persistentVolumeClaim:
            claimName: bot-pvc
        - name: dhcp-logs-pvc
          persistentVolumeClaim:
            claimName: dhcp-logs-pvc
        - name: macs-pvc
          persistentVolumeClaim:
            claimName: macs-pvc
