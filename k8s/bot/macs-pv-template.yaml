apiVersion: v1
kind: PersistentVolume
metadata:
  name: macs-pv
spec:
  capacity:
    storage: 512Mi
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain # Prevent data loss
  storageClassName: smb
  mountOptions:
    - noperm # Disable permission checks on client side
    - vers=3.1 # SMB protocol version
    - cache=strict # Disable caching
    - noserverino # Disable inode numbers. Required to prevent data corruption
    - sec=ntlmssp # Use NTLMSSP security mode
  csi:
    driver: smb.csi.k8s.io # Use the SMB CSI driver. Source: https://github.com/kubernetes-csi/csi-driver-smb
    volumeHandle: "macs-volume"
    volumeAttributes:
      source: "//your-smb-server/shared-folder"
    nodeStageSecretRef:
      name: smb-secrets
      namespace: default
